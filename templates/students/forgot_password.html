{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-[#0a0a0a] text-white">
  <div class="bg-[#111111] p-8 rounded-2xl shadow-xl max-w-md w-full">
    <h1 class="text-2xl font-bold text-green-400 mb-6">Forgot Password</h1>
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl 
                    {% if message.tags == 'success' %}bg-green-900/40 border border-green-700 text-green-300
                    {% elif message.tags == 'error' %}bg-red-900/40 border border-red-700 text-red-300
                    {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Enter your registered email" required
             class="w-full bg-[#0d0d0d] border border-gray-700 rounded-xl py-3 px-4 text-gray-100 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl shadow-lg transition-all duration-300">
        Send Reset Link
      </button>
    </form>
  </div>
</section>
{% endblock %}
