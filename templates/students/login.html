{% extends "base.html" %}
{% load static %}
{% block title %}Student Login{% endblock %}

{% block content %}
<!-- Login Section -->
<section class="min-h-screen flex items-center justify-center bg-[#0a0a0a] px-4">
  <div class="bg-[#111111] rounded-3xl shadow-2xl w-full max-w-md p-10 border border-gray-800 relative overflow-hidden" x-data="{ showPassword: false }">

    <h2 class="text-3xl font-extrabold text-center text-green-400 mb-8 tracking-wide">Student Login</h2>

    <!-- Messages -->
    {% if messages %}
      <div class="mb-4">
        {% for message in messages %}
          <p class="text-center text-sm {% if message.tags == 'error' %}text-red-500{% else %}text-green-400{% endif %} animate-pulse">
            {{ message }}
          </p>
        {% endfor %}
      </div>
    {% endif %}

    <!-- Login Form -->
    <form method="POST" action="" class="space-y-6">
      {% csrf_token %}
      
      <!-- Email -->
      <div>
        <label for="email" class="block text-gray-300 mb-2 text-sm font-medium">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full px-4 py-3 rounded-xl bg-gray-800 text-gray-200 border border-gray-700 focus:ring-2 focus:ring-green-500 outline-none transition duration-200 hover:border-green-500">
      </div>

      <!-- Password with Eye Icon -->
      <div>
        <label for="password" class="block text-gray-300 mb-2 text-sm font-medium">Password</label>
        <div class="relative">
          <input type="password" id="password" name="password" required
                 x-bind:type="showPassword ? 'text' : 'password'"
                 class="w-full px-4 py-3 rounded-xl bg-gray-800 text-gray-200 border border-gray-700 focus:ring-2 focus:ring-green-500 outline-none transition duration-200 hover:border-green-500 pr-12">
          <button type="button" @click="showPassword = !showPassword"
                  class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-green-400 transition">
            <svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg x-show="showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.955 9.955 0 012.293-3.95m3.293-2.12A9.955 9.955 0 0112 5c4.478 0 8.269 2.943 9.543 7a9.955 9.955 0 01-2.293 3.95m-3.293 2.12L4.5 4.5" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember Me and Forgot Password -->
      <div class="flex items-center justify-between">
        <label class="flex items-center space-x-2 text-gray-300 text-sm">
          <input type="checkbox" name="remember_me" class="h-4 w-4 text-green-400 rounded focus:ring-green-500 bg-gray-800 border-gray-700">
          <span>Remember Me</span>
        </label>
        <a href="{% url 'forgot_password' %}" class="text-sm text-green-400 hover:text-green-500 transition">
          Forgot Password?
        </a>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition transform hover:-translate-y-1 hover:shadow-lg">
        Login
      </button>
    </form>

  </div>
</section>

<!-- Alpine.js for show/hide password -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
{% endblock %}
