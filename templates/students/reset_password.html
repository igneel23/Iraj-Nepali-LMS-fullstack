{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="min-h-screen flex justify-center items-center bg-[#0a0a0a] text-white p-6">
  <div class="bg-gray-900/50 p-8 rounded-2xl shadow-xl max-w-md w-full" x-data="{ show1: false, show2: false }">

    <!-- Header -->
    <h1 class="text-2xl font-bold text-green-400 mb-4">Reset Password</h1>
    <p class="text-gray-400 mb-6">Enter your new password below to reset your account password.</p>

    <!-- Display messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-2 rounded-xl
                    {% if message.tags == 'success' %}bg-green-900/40 border border-green-700 text-green-300
                    {% elif message.tags == 'error' %}bg-red-900/40 border border-red-700 text-red-300{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Reset Password Form -->
    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- New Password -->
      <div>
        <label for="id_new_password1" class="block text-gray-400 text-sm font-semibold mb-1">New Password</label>
        <div class="relative">
          <input type="password" name="new_password1" id="id_new_password1"
                 x-bind:type="show1 ? 'text' : 'password'"
                 class="w-full bg-[#0d0d0d] border border-gray-700 rounded-xl py-3 px-4 pr-12 text-gray-100 focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                 placeholder="Enter new password">
          <button type="button" @click="show1 = !show1"
                  class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-green-400 transition">
            <svg x-show="!show1" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg x-show="show1" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.955 9.955 0 012.293-3.95m3.293-2.12A9.955 9.955 0 0112 5c4.478 0 8.269 2.943 9.543 7a9.955 9.955 0 01-2.293 3.95m-3.293 2.12L4.5 4.5" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="id_new_password2" class="block text-gray-400 text-sm font-semibold mb-1">Confirm New Password</label>
        <div class="relative">
          <input type="password" name="new_password2" id="id_new_password2"
                 x-bind:type="show2 ? 'text' : 'password'"
                 class="w-full bg-[#0d0d0d] border border-gray-700 rounded-xl py-3 px-4 pr-12 text-gray-100 focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                 placeholder="Confirm new password">
          <button type="button" @click="show2 = !show2"
                  class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-green-400 transition">
            <svg x-show="!show2" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg x-show="show2" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.269-2.943-9.543-7a9.955 9.955 0 012.293-3.95m3.293-2.12A9.955 9.955 0 0112 5c4.478 0 8.269 2.943 9.543 7a9.955 9.955 0 01-2.293 3.95m-3.293 2.12L4.5 4.5" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 py-3 px-4 rounded-xl font-semibold shadow-lg transition">
        Reset Password
      </button>
    </form>
  </div>
</div>

<!-- Alpine.js for show/hide password -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
{% endblock %}
