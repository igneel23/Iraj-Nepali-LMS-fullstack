<!-- Left Sidebar Navigation -->
<aside
  id="sidebar"
  class="fixed top-0 left-0 h-full w-64 bg-[#0a0a0a] border-r border-gray-900 flex flex-col transition-transform duration-300 shadow-lg -translate-x-full lg:translate-x-0 z-40"
>
  <!-- Logo / Title -->
  <div class="flex items-center justify-center h-20 border-b border-gray-900 bg-[#0a0a0a]">
    <a href="{% url 'student_dashboard' %}" class="text-green-400 text-2xl font-extrabold tracking-tight flex items-center space-x-2 hover:text-green-500 transition duration-200">
      Skill<span class="text-white">Pathsala</span>
    </a>
  </div>

  <!-- Navigation Links -->
<nav class="flex-1 mt-6 px-3 space-y-2">
  <a href="{% url 'student_dashboard' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'student_dashboard' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-house mr-3"></i> Dashboard
  </a>

  <a href="{% url 'my_learning' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'my_learning' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-book-open mr-3"></i> My Courses
  </a>

  <a href="{% url 'assignments:student_assignments' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'student_assignments' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-file-lines mr-3"></i> Assignments
  </a>

  <a href="{% url 'attendence:student_attendance' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'student_attendance' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-file-lines mr-3"></i> Attendance
  </a>

  <a href="{% url 'student_certificates' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'student_certificates' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-certificate mr-3"></i> Certificates
  </a>
  <a href="{% url 'student_profile' %}"
     class="flex items-center px-4 py-3 rounded-xl transition duration-200
            {% if request.resolver_match.url_name == 'student_profile' %}
              bg-green-500/20 text-green-400
            {% else %}
              text-gray-300 hover:bg-green-700/20 hover:text-green-400
            {% endif %}">
    <i class="fa-solid fa-book-open mr-3"></i> My Profile
  </a>
</nav>


  <!-- Profile & Logout -->
  <div class="border-t border-gray-800 p-4">
    <div class="relative">
      <button id="profileBtn" class="flex items-center justify-between w-full text-gray-300 hover:text-green-400 transition duration-200">
        <span class="flex items-center space-x-2">
          <i class="fa-solid fa-user-circle text-lg"></i>
          <span>{{ request.user.username }}</span>
        </span>
        <svg class="w-4 h-4 transform transition-transform duration-200" id="dropdownIcon"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Dropdown -->
      <div id="profileMenu"
           class="absolute bottom-12 left-0 w-full bg-gray-900 rounded-xl shadow-lg opacity-0 translate-y-2 pointer-events-none transition-all duration-200 z-50">
        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-red-400 hover:bg-red-700/20 hover:text-red-300 rounded-b-lg transition">Logout</a>
      </div>
    </div>
  </div>
</aside>

<!-- Mobile Toggle Button -->
<button id="toggleSidebar" class="lg:hidden fixed top-4 left-4 z-50 bg-gray-900 text-green-400 p-2 rounded-md shadow-md hover:bg-green-700/20 transition duration-200">
  <i class="fa-solid fa-bars"></i>
</button>

<!-- Overlay for Mobile -->
<div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"></div>

<!-- JS for Dropdown + Sidebar -->
<script>
  const profileBtn = document.getElementById('profileBtn');
  const profileMenu = document.getElementById('profileMenu');
  const dropdownIcon = document.getElementById('dropdownIcon');
  const sidebar = document.getElementById('sidebar');
  const toggleSidebar = document.getElementById('toggleSidebar');
  const overlay = document.getElementById('overlay');

  // Profile dropdown
  profileBtn.addEventListener('click', () => {
    const isVisible = profileMenu.classList.contains('opacity-100');
    profileMenu.classList.toggle('opacity-100', !isVisible);
    profileMenu.classList.toggle('translate-y-0', !isVisible);
    profileMenu.classList.toggle('pointer-events-auto', !isVisible);
    dropdownIcon.classList.toggle('rotate-180', !isVisible);
  });

  // Sidebar toggle
  toggleSidebar.addEventListener('click', () => {
    const isOpen = sidebar.classList.contains('-translate-x-full');
    sidebar.classList.toggle('-translate-x-full', !isOpen);
    overlay.classList.toggle('hidden', isOpen);
  });

  // Close sidebar on overlay click
  overlay.addEventListener('click', () => {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
  });
</script>
